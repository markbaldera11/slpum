
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Scanner</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 20px; background-color: #f0f2f5; margin: 0; color: #333; }
    .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 500px; margin: 0 auto; }
    h2 { margin-top: 0; color: #1a1a1a; }
    #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 15px; display: none; }
    #status { font-size: 1.1em; font-weight: bold; margin: 15px 0; min-height: 25px; padding: 15px; border-radius: 6px; word-wrap: break-word; }
    .idle { background: #e9ecef; color: #495057; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .btn { background: #0066cc; color: white; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; box-sizing: border-box; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn:active { background: #0052a3; }
    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #0066cc; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="container">
    <h2>Attendance Scanner</h2>
    
    <button id="startBtn" class="btn" onclick="startScanner()">
      <span id="btnIcon">🎥</span> 
      <span id="btnText">Start Camera</span>
      <div id="loader" class="loader"></div>
    </button>
    
    <div id="reader"></div>
    <div id="status" class="idle">Ready to scan...</div>
  </div>

  <script>
    // ====================================================
    // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL BELOW
    // ====================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbyJyy1rSsfCjxTvUhRHF9RC9ETuDAKZd9oYtq4nI3CE_WPa-eeqFtwUllLScPVSi-WH/exec"; 

    let html5QrCode;

    function startScanner() {
      const startBtn = document.getElementById('startBtn');
      const readerDiv = document.getElementById('reader');
      const statusDiv = document.getElementById('status');

      startBtn.style.display = "none";
      readerDiv.style.display = "block";
      statusDiv.innerText = "Requesting camera access...";
      statusDiv.className = "idle";

      html5QrCode = new Html5Qrcode("reader");

      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess,
        (errorMessage) => { /* Ignore frame errors */ }
      ).then(() => {
        statusDiv.innerText = "Scanning... Point at a QR Code";
      }).catch((err) => {
        readerDiv.style.display = "none";
        startBtn.style.display = "flex";
        statusDiv.innerText = "Camera blocked. Please check browser permissions.";
        statusDiv.className = "error";
      });
    }

    function onScanSuccess(decodedText) {
      const statusDiv = document.getElementById('status');
      
      // Pause scanner immediately
      html5QrCode.pause();
      statusDiv.innerText = `Saving: ${decodedText}...`;
      statusDiv.className = "idle";

      // Send to Google Apps Script API
      const requestUrl = `${API_URL}?action=scan&email=${encodeURIComponent(decodedText)}`;

      fetch(requestUrl)
        .then(response => response.json())
        .then(data => {
           statusDiv.innerText = data.message;
           statusDiv.className = data.message.includes("Success") ? "success" : "error";
           
           // Resume scanning after 2.5 seconds
           setTimeout(() => { 
             statusDiv.innerText = "Scanning... Point at next QR Code";
             statusDiv.className = "idle";
             html5QrCode.resume(); 
           }, 2500); 
        })
        .catch(error => {
           statusDiv.innerText = "Network Error. Please try again.";
           statusDiv.className = "error";
           setTimeout(() => { html5QrCode.resume(); }, 2500);
        });
    }
  </script>
</body>
</html>
